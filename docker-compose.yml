version: "3.9"

services:
  # ─── Redis (caching + rate limiting) ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: onnx-inference-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── ONNX Inference Engine API Server ──────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: onnx-inference-server
    environment:
      # Supabase PostgreSQL — set these in your deployment environment
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
      CRUCIBLE_MODEL_DIR: /app/models
      # Auth — MUST set these in production
      CRUCIBLE_API_KEY: ${CRUCIBLE_API_KEY}
      CRUCIBLE_SECRET_KEY: ${CRUCIBLE_SECRET_KEY}
      # CORS — set to your frontend URL
      CRUCIBLE_CORS_ORIGINS: ${CRUCIBLE_CORS_ORIGINS:-http://localhost:3000}
      INFERENCE_TIMEOUT_SEC: 60
      MAX_UPLOAD_BYTES: 209715200
      CRUCIBLE_LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        python3 -c 'import asyncpg; import asyncio; import os; url=os.environ.get(\"DATABASE_URL\",\"\");
        if url:
          dsn=url.replace(\"+asyncpg\",\"\")
          asyncio.run(asyncpg.connect(dsn=dsn))' &&
        echo 'Running migrations...' &&
        cd server && alembic upgrade head &&
        echo 'Starting server...' &&
        uvicorn server.main:app --host 0.0.0.0 --port 8000 --workers 2
      "

  # ─── Web Frontend (TanStack Start) ──────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: onnx-inference-web
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    depends_on:
      - server
    restart: unless-stopped

  # ─── Prometheus (metrics collection) ───────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.49.0
    container_name: onnx-inference-prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped

  # ─── Grafana (metrics dashboard) ───────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    container_name: onnx-inference-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL:-http://localhost:3001}
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  grafana_data:
    driver: local
  prometheus_data:
    driver: local

networks:
  default:
    driver: bridge
